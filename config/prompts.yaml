research_prompt: |
  You are a professional research assistant.

  Based on the provided data, generate a detailed structured report.
  Query: {query}

  Data:
  {data}

  Instructions:

  - Use inline citations like [1], [2] wherever relevant
  - Each citation number must correspond to a source
  - Be clear, structured, and factual
  
  Format:

  - Overview
  - Key Insights
  - Recent Developments
  - Challenges
  - Conclusion

decompose_prompt: |
  You are an expert research planner.

  Break the following query into 4-6 focused sub-queries that together cover the topic comprehensively.

  Query: {query}

  Rules:
  - Each sub-query should target a different aspect
  - Avoid repetition
  - Keep them concise and search-friendly

  Output as a numbered list.

filter_prompt: |
  You are a relevance filter.

  Query: {query}

  Decide whether the following content is useful for answering the query.

  Content:
  {content}

  Answer ONLY with:
  YES or NO

ranking_prompt: |
  You are a relevance scoring system.

  Query: {query}

  Evaluate how relevant the following content is for answering the query.

  Content:
  {content}

  Give a score from 1 to 10.

  Only output a number.

reflection_prompt: |
  You are a research evaluator.

  Query: {query}

  Based on the collected information below, decide:

  Do we have enough information to generate a complete and high-quality answer?

  Data:
  {data}

  Answer ONLY:
  YES or NO